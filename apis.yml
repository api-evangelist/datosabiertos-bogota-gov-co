apis:
  - aid: datosabiertos-bogota-gov-co:catalog
    name: Datos Abiertos Bogota CKAN Action API
    description: >-
      CKAN Action API for Datos Abiertos Bogota, a consistent JSON-over-HTTP interface over a catalog of 2,112 datasets. Standard actions include package_search, package_show, package_list, organization_list, group_list, tag_list, and resource_search; datastore_search is available where the DataStore extension is enabled. Base URL https://datosabiertos.bogota.gov.co/api/3/action/.
