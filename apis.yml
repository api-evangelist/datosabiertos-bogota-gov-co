aid: datosabiertos-bogota-gov-co
name: Datos Abiertos Bogota
description: >-
  Datos Abiertos Bogota is a municipal government open-data portal for Colombia running CKAN.
  It exposes the CKAN catalog API, a standardized machine-readable interface over approximately 2,112 datasets,
  supporting programmatic dataset search, metadata retrieval, and resource access. Because it runs CKAN, it shares a
  consistent API surface with every other CKAN portal, making it uniformly harvestable and integrable.
